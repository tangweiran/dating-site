<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朱灵杰 - 生活态度</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sub-container">
        <h1 class="sub-title">生活态度</h1>

        <section class="card">
            <h2>生活理念</h2>
            <div class="attitude-list">
                <div class="attitude-item">
                    <span class="attitude-icon">☀️</span>
                    <p>保持积极乐观的心态，笑对生活中的每一天</p>
                </div>
                <div class="attitude-item">
                    <span class="attitude-icon">💪</span>
                    <p>坚持运动，保持健康的身体和充沛的精力</p>
                </div>
                <div class="attitude-item">
                    <span class="attitude-icon">📚</span>
                    <p>不断学习新知识，充实自己，提升自我</p>
                </div>
                <div class="attitude-item">
                    <span class="attitude-icon">❤️</span>
                    <p>珍惜身边的人，用心经营每一段关系</p>
                </div>
                <div class="attitude-item">
                    <span class="attitude-icon">🌟</span>
                    <p>脚踏实地，努力奋斗，追求更好的自己</p>
                </div>
            </div>
        </section>

        <a href="index.html" class="back-link">← 返回主页</a>

        <footer class="footer">
            <p>真诚交友，非诚勿扰</p>
        </footer>
    </div>
</body>
</html>
