<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朱灵杰 - 个人征婚</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <img src="photo.png" alt="朱灵杰" class="avatar-img">
            <h1>朱灵杰</h1>
            <p class="subtitle">真诚寻找另一半</p>
        </header>

        <section class="card main-info fade-in">
            <h2>关于我</h2>
            <div class="info-grid">
                <div class="info-item">
                    <span class="label">年龄</span>
                    <span class="value">22岁</span>
                </div>
                <div class="info-item">
                    <span class="label">性别</span>
                    <span class="value">男</span>
                </div>
                <div class="info-item">
                    <span class="label">身高</span>
                    <span class="value">168cm</span>
                </div>
                <div class="info-item">
                    <span class="label">学历</span>
                    <span class="value">研究生在读</span>
                </div>
                <div class="info-item">
                    <span class="label">学校</span>
                    <span class="value">重庆邮电大学</span>
                </div>
                <div class="info-item">
                    <span class="label">所在地</span>
                    <span class="value">重庆九龙坡</span>
                </div>
            </div>
        </section>

        <section class="card countdown-card fade-in">
            <h2>我们认识</h2>
            <div class="countdown" id="countdown">
                <span class="countdown-num" id="days">0</span>
                <span class="countdown-label">天</span>
                <span class="countdown-num" id="hours">0</span>
                <span class="countdown-label">小时</span>
                <span class="countdown-num" id="minutes">0</span>
                <span class="countdown-label">分钟</span>
            </div>
            <p class="countdown-hint">期待与你相遇的每一天</p>
        </section>

        <section class="card quote-card fade-in">
            <h2>每日情话</h2>
            <p class="quote-text" id="quote"></p>
        </section>

        <h2 class="section-title">了解更多</h2>
        <div class="nav-grid">
            <a href="bio.html" class="nav-card fade-in" style="background: linear-gradient(135deg, #ff9a9e, #fad0c4);">
                <span class="nav-icon">👤</span>
                <span class="nav-title">个人简介</span>
            </a>
            <a href="photos.html" class="nav-card fade-in" style="background: linear-gradient(135deg, #a18cd1, #fbc2eb);">
                <span class="nav-icon">📷</span>
                <span class="nav-title">生活照片</span>
            </a>
            <a href="personality.html" class="nav-card fade-in" style="background: linear-gradient(135deg, #fbc2eb, #a6c1ee);">
                <span class="nav-icon">✨</span>
                <span class="nav-title">性格特点</span>
            </a>
            <a href="future.html" class="nav-card fade-in" style="background: linear-gradient(135deg, #84fab0, #8fd3f4);">
                <span class="nav-icon">🎯</span>
                <span class="nav-title">未来规划</span>
            </a>
            <a href="love.html" class="nav-card fade-in" style="background: linear-gradient(135deg, #ffecd2, #fcb69f);">
                <span class="nav-icon">💕</span>
                <span class="nav-title">恋爱观</span>
            </a>
            <a href="attitude.html" class="nav-card fade-in" style="background: linear-gradient(135deg, #a1c4fd, #c2e9fb);">
                <span class="nav-icon">🌈</span>
                <span class="nav-title">生活态度</span>
            </a>
            <a href="criteria.html" class="nav-card fade-in" style="background: linear-gradient(135deg, #fdcbf1, #e6dee9);">
                <span class="nav-icon">♡</span>
                <span class="nav-title">择偶标准</span>
            </a>
            <a href="hobbies.html" class="nav-card fade-in" style="background: linear-gradient(135deg, #f5f7fa, #c3cfe2);">
                <span class="nav-icon">★</span>
                <span class="nav-title">兴趣爱好</span>
            </a>
            <a href="contact.html" class="nav-card fade-in" style="background: linear-gradient(135deg, #d4fc79, #96e6a1);">
                <span class="nav-icon">✉</span>
                <span class="nav-title">联系方式</span>
            </a>
        </div>

        <section class="card guestbook-card fade-in">
            <h2>留言板</h2>
            <div class="guestbook-form">
                <input type="text" id="guestName" placeholder="你的名字" class="guestbook-input">
                <textarea id="guestMessage" placeholder="写下你想说的话..." class="guestbook-textarea"></textarea>
                <button onclick="addMessage()" class="guestbook-btn">留言</button>
            </div>
            <div id="guestbookMessages" class="guestbook-messages"></div>
        </section>

        <div class="music-player" id="musicPlayer">
            <button onclick="toggleMusic()" class="music-btn" id="musicBtn">♪</button>
        </div>

        <footer class="footer">
            <p>真诚交友，非诚勿扰</p>
        </footer>
    </div>

    <script>
        const quotes = [
            "遇见你，是我最美丽的意外。",
            "你是我温暖的手套，冰冷的啤酒，带着阳光味道的衬衫，日复一日的梦想。",
            "我想和你一起变老，一起走过每一个春夏秋冬。",
            "你笑起来真好看，像春天的花一样。",
            "我愿意用一辈子的桃花运，来换一个对的人。",
            "你是我今生渡不过的劫，多看一眼就心软，拥抱一下就沦陷。",
            "我想把世界上最好的都给你，却发现世界上最好的就是你。",
            "你是我最想留住的幸运。",
            "遇见你是命运的安排，而爱上你是我情不自禁。",
            "你是我生命中最美的风景。"
        ];

        document.getElementById('quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];

        function updateCountdown() {
            const startDate = new Date('2024-01-01');
            const now = new Date();
            const diff = now - startDate;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            
            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
        }
        updateCountdown();
        setInterval(updateCountdown, 60000);

        const guestbook = JSON.parse(localStorage.getItem('guestbook') || '[]');
        function renderGuestbook() {
            const container = document.getElementById('guestbookMessages');
            container.innerHTML = guestbook.map(msg => 
                `<div class="guestbook-msg"><strong>${msg.name}</strong><p>${msg.message}</p></div>`
            ).join('');
        }
        renderGuestbook();

        function addMessage() {
            const name = document.getElementById('guestName').value.trim();
            const message = document.getElementById('guestMessage').value.trim();
            if (!name || !message) return alert('请填写名字和留言内容');
            
            guestbook.unshift({ name, message, time: new Date().toLocaleString() });
            localStorage.setItem('guestbook', JSON.stringify(guestbook));
            renderGuestbook();
            document.getElementById('guestName').value = '';
            document.getElementById('guestMessage').value = '';
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>
</body>
</html>
