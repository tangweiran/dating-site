<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朱灵杰 - 个人征婚</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
    </div>

    <div class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</div>

    <div class="page-wrapper">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="bio.html" class="sidebar-link">👤 个人简介</a>
                <a href="personality.html" class="sidebar-link">✨ 性格特点</a>
                <a href="future.html" class="sidebar-link">🎯 未来规划</a>
                <a href="love.html" class="sidebar-link">💕 恋爱观</a>
                <a href="attitude.html" class="sidebar-link">🌈 生活态度</a>
                <a href="criteria.html" class="sidebar-link">♡ 择偶标准</a>
                <a href="hobbies.html" class="sidebar-link">★ 兴趣爱好</a>
                <a href="contact.html" class="sidebar-link">✉ 联系方式</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="profile-card fade-in">
                <img src="photo.png" alt="朱灵杰" class="main-avatar">
                <h1>朱灵杰</h1>
                <p class="subtitle" id="greeting"></p>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="label">年龄</span>
                        <span class="value">22岁</span>
                    </div>
                    <div class="info-item">
                        <span class="label">性别</span>
                        <span class="value">男</span>
                    </div>
                    <div class="info-item">
                        <span class="label">身高</span>
                        <span class="value">168cm</span>
                    </div>
                    <div class="info-item">
                        <span class="label">学历</span>
                        <span class="value">硕士在读</span>
                    </div>
                    <div class="info-item">
                        <span class="label">学校</span>
                        <span class="value">重庆邮电大学</span>
                    </div>
                    <div class="info-item">
                        <span class="label">所在地</span>
                        <span class="value">重庆九龙坡</span>
                    </div>
                </div>
                <div class="countdown" id="countdown">
                    <span class="countdown-num" id="days">0</span>
                    <span class="countdown-label">天</span>
                    <span class="countdown-num" id="hours">0</span>
                    <span class="countdown-label">小时</span>
                    <span class="countdown-num" id="minutes">0</span>
                    <span class="countdown-label">分钟</span>
                </div>
                <p class="countdown-hint">我们认识</p>
                <div class="action-buttons">
                    <button id="shareBtn" class="share-btn">分享</button>
                    <button id="likeBtn" class="like-btn" onclick="toggleLike()">👍 <span id="likeCount">0</span></button>
                </div>
            </div>
        </main>

        <aside class="right-panel">
            <div class="guestbook fade-in">
                <h2>留言板</h2>
                <div class="guestbook-form">
                    <input type="text" id="guestName" placeholder="你的名字" class="guestbook-input">
                    <textarea id="guestMessage" placeholder="写下你想说的话..." class="guestbook-textarea"></textarea>
                    <button onclick="addMessage()" class="guestbook-btn">留言</button>
                </div>
                <div id="guestbookMessages" class="guestbook-messages"></div>
            </div>
        </aside>
    </div>

    <div class="bottom-row">
        <section class="quote-card fade-in">
            <h2>每日情话</h2>
            <p class="quote-text" id="quote"></p>
        </section>
    </div>

    <div class="bottom-row">
        <section class="timeline-card fade-in">
            <h2>我的经历</h2>
            <div class="timeline">
                <div class="timeline-item left">
                    <div class="timeline-content">
                        <h3>2004年</h3>
                        <p>出生在重庆</p>
                    </div>
                </div>
                <div class="timeline-item right">
                    <div class="timeline-content">
                        <h3>2022年</h3>
                        <p>考入重庆邮电大学</p>
                    </div>
                </div>
                <div class="timeline-item left">
                    <div class="timeline-content">
                        <h3>2026年</h3>
                        <p>攻读硕士学位</p>
                    </div>
                </div>
                <div class="timeline-item right">
                    <div class="timeline-content">
                        <h3>未来</h3>
                        <p>遇见你 ❤️</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div class="bottom-row">
        <section class="game-card fade-in">
            <h2>每日抽签</h2>
            <div class="game-content">
                <div class="fortune-display" id="fortune">点击下方按钮抽签</div>
                <button class="game-btn" onclick="drawFortune()">🔮 抽签</button>
            </div>
        </section>
    </div>

    <div class="music-player">
        <button onclick="toggleMusic()" class="music-btn" id="musicBtn">♪</button>
    </div>

    <footer class="footer">
        <p>真诚交友，非诚勿扰</p>
        <p>本站访客：<span id="busuanzi_value_site_uv">0</span> 人</p>
    </footer>

    <script src="shared.js"></script>
    <script>
        const hour = new Date().getHours();
        let greeting = '';
        if (hour < 6) greeting = '🌙 夜深了，注意休息哦';
        else if (hour < 9) greeting = '🌅 早安，新的一天开始了';
        else if (hour < 12) greeting = '☀️ 上午好，今天也要加油';
        else if (hour < 14) greeting = '🌞 中午好，记得吃午饭';
        else if (hour < 17) greeting = '🌤️ 下午好，继续努力';
        else if (hour < 19) greeting = '🌅 傍晚好，辛苦了一天';
        else if (hour < 22) greeting = '🌆 晚上好，放松一下吧';
        else greeting = '🌙 夜深了，早点休息哦';
        document.getElementById('greeting').textContent = greeting;

        const quotes = [
            "遇见你，是我最美丽的意外。",
            "你是我温暖的手套，冰冷的啤酒，带着阳光味道的衬衫，日复一日的梦想。",
            "我想和你一起变老，一起走过每一个春夏秋冬。",
            "你笑起来真好看，像春天的花一样。",
            "我愿意用一辈子的桃花运，来换一个对的人。",
            "你是我今生渡不过的劫，多看一眼就心软，拥抱一下就沦陷。",
            "我想把世界上最好的都给你，却发现世界上最好的就是你。",
            "你是我最想留住的幸运。",
            "遇见你是命运的安排，而爱上你是我情不自禁。",
            "你是我生命中最美的风景。",
            "往后余生，风雪是你，平淡是你，清贫也是你。",
            "我见过春风十里，见过夏至未至，试过秋光涟漪，爱过冬日暖阳，全都不及你。",
            "你是我的今天，以及所有的明天。",
            "我想写一个故事，以我开始，以我们结束。",
            "你知道你和星星的区别吗？星星点亮了黑夜，而你点亮了我的心。",
            "世间五味俱全，谢谢你给我的甜。",
            "我这一生，除了故乡，只为你一个人写过月亮。",
            "你是我疲惫生活中唯一的英雄梦想。",
            "喜欢你是一件很麻烦的事，但我偏偏喜欢找麻烦。",
            "我对你的喜欢，就像是揣在兜里的一块糖，明明想和别人显摆，却又怕别人抢。"
        ];

        const quoteEl = document.getElementById('quote');
        const quoteText = quotes[Math.floor(Math.random() * quotes.length)];
        let i = 0;
        function typeWriter() {
            if (i < quoteText.length) {
                quoteEl.textContent += quoteText.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }
        typeWriter();

        function updateCountdown() {
            const startDate = new Date('2026-06-17');
            const now = new Date();
            const diff = now - startDate;
            document.getElementById('days').textContent = Math.floor(diff / 86400000);
            document.getElementById('hours').textContent = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('minutes').textContent = Math.floor((diff % 3600000) / 60000);
        }
        updateCountdown();
        setInterval(updateCountdown, 60000);

        let likeCount = parseInt(localStorage.getItem('likeCount') || '0');
        let liked = localStorage.getItem('liked') === 'true';
        document.getElementById('likeCount').textContent = likeCount;
        if (liked) document.getElementById('likeBtn').classList.add('liked');

        function toggleLike() {
            if (liked) {
                likeCount--;
                liked = false;
                document.getElementById('likeBtn').classList.remove('liked');
            } else {
                likeCount++;
                liked = true;
                document.getElementById('likeBtn').classList.add('liked');
            }
            localStorage.setItem('likeCount', likeCount);
            localStorage.setItem('liked', liked);
            document.getElementById('likeCount').textContent = likeCount;
        }

        const guestbook = JSON.parse(localStorage.getItem('guestbook') || '[{"name":"66A","message":"男神，"}]');
        function renderGuestbook() {
            document.getElementById('guestbookMessages').innerHTML = guestbook.map(m =>
                `<div class="guestbook-msg"><strong>${m.name}</strong><p>${m.message}</p></div>`
            ).join('');
        }
        renderGuestbook();

        function addMessage() {
            const name = document.getElementById('guestName').value.trim();
            const message = document.getElementById('guestMessage').value.trim();
            if (!name || !message) return alert('请填写名字和留言内容');
            guestbook.unshift({ name, message });
            localStorage.setItem('guestbook', JSON.stringify(guestbook));
            renderGuestbook();
            document.getElementById('guestName').value = '';
            document.getElementById('guestMessage').value = '';
        }

        const fortunes = [
            '上上签 🌟 今日运势极佳，万事如意！',
            '上签 ✨ 诸事顺利，心想事成！',
            '中上签 🌸 稳中有进，保持乐观！',
            '中签 🍀 平平淡淡才是真！',
            '中下签 💪 需要努力，但不要放弃！',
            '下签 🌧️ 今天可能有点小波折，但会过去的！',
            '桃花签 💕 今日桃花运旺盛！',
            '事业签 🎯 工作学业会有新突破！',
            '财运签 💰 小财不断，大财可期！',
            '健康签 💚 注意休息，身体最重要！'
        ];

        function drawFortune() {
            const fortune = fortunes[Math.floor(Math.random() * fortunes.length)];
            const el = document.getElementById('fortune');
            el.style.opacity = '0';
            setTimeout(() => {
                el.textContent = fortune;
                el.style.opacity = '1';
            }, 300);
        }

        const musicBtn = document.getElementById('musicBtn');
        let isPlaying = false;

        function toggleMusic() {
            const iframe = document.querySelector('iframe[src="music-player.html"]');
            if (!iframe) return;
            const music = iframe.contentDocument.getElementById('bgMusic');
            if (isPlaying) { music.pause(); musicBtn.classList.remove('playing'); }
            else { music.play(); musicBtn.classList.add('playing'); }
            isPlaying = !isPlaying;
        }

        setTimeout(() => {
            musicBtn.classList.add('playing');
            isPlaying = true;
        }, 1000);

        const dark = localStorage.getItem('darkMode') === 'true';
        if (dark) {
            document.body.classList.add('dark-mode');
            document.getElementById('themeToggle').textContent = '☀️';
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('darkMode', isDark);
        }

        document.addEventListener('mousemove', function(e) {
            const trail = document.createElement('div');
            trail.className = 'mouse-trail';
            trail.style.left = e.clientX + 'px';
            trail.style.top = e.clientY + 'px';
            document.body.appendChild(trail);
            setTimeout(() => trail.remove(), 800);
        });
    </script>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>
